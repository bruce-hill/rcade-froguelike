<!doctype html>
<html lang="en">
  <head>
    <title>PICO-8 Cartridge</title>
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <style>
      html,
      body {
        height: 100%;
        width: 100%;
        padding: 0;
        margin: 0;
        background-color: #0ff;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #canvas {
        image-rendering: -moz-crisp-edges;
        image-rendering: -webkit-crisp-edges;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }
    </style>

    
  </head>

  <body>
    <div id="log" style="display:none;font-family:monospace;white-space:pre-wrap;background:#111;color:#8f8;padding:10px;font-weight:800;"></div>
    <script>
      const logElem = document.getElementById('log');
      const log = (type, args) => {
        logElem.innerHTML += `<span style="color:${type==='error'?'#f55':type==='warn'?'#fa0':'#0f0'}">[${type}] ${[...args].map(a=>typeof a==='object'?JSON.stringify(a,null,2):a).join(' ')}</span>\n`;
      };

      ['log','warn','error','info'].forEach(t => {
        const orig = console[t];
        console[t] = (...args) => { log(t, args); orig.apply(console, args); };
      });

      window.onerror = (msg, src, line, col, err) => {
        log('error', [`${msg} (${src}:${line}:${col})`]);
      };

      window.onunhandledrejection = e => log('error', ['Unhandled promise rejection:', e.reason]);
      console.log("Starting...");
    </script>
    <script type="text/javascript">
      // When pico8_state is defined, PICO-8 will set .is_paused, .sound_volume and .frame_number each frame
      // (used for determining button icons)
      var pico8_state = [];

      // When pico8_buttons is defined, PICO-8 reads each int as a bitfield holding that player's button states
      // 0x1 left, 0x2 right, 0x4 up, 0x8 right, 0x10 O, 0x20 X, 0x40 menu
      var pico8_buttons = [0, 0, 0, 0, 0, 0, 0, 0]; // max 8 players

      // When pico8_gpio is defined, reading and writing to gpio pins will read and write to these values
      var pico8_gpio = new Array(128);

      // When pico8_audio_context context is defined, the html shell (this file) is responsible for creating and managing it.
      // This makes satisfying browser requirements easier -- e.g. initialising audio from a short script in response to a user action.
      // Otherwise PICO-8 will try to create and use its own context.
      var pico8_audio_context;

      function p8_update_layout() {
        var canvas = document.getElementById("canvas");
        if (!canvas) {
          requestAnimationFrame(p8_update_layout);
          return;
        }
        var csize = 128;
        while (2*csize <= Math.min(window.innerWidth, window.innerHeight))
          csize *= 2;
        canvas.style.width = csize + "px";
        canvas.style.height = csize + "px";
        requestAnimationFrame(p8_update_layout);
      }

      function p8_create_audio_context() {
        if (pico8_audio_context) {
          try {
            pico8_audio_context.resume();
          } catch (err) {
            console.log("** pico8_audio_context.resume() failed");
          }
          return;
        }

        var webAudioAPI =
          window.AudioContext ||
          window.webkitAudioContext ||
          window.mozAudioContext ||
          window.oAudioContext ||
          window.msAudioContext;
        if (webAudioAPI) {
          pico8_audio_context = new webAudioAPI();
        }
      }

      var p8_is_running = false;
      var p8_script = null;
      var Module = null;

      function p8_run_cart() {
        if (p8_is_running) return;
        p8_is_running = true;

        p8_create_audio_context();

        var e = document.createElement("script");
        p8_script = e;
        e.type = "application/javascript";
        e.src = "cart.js";
        e.id = "e_script";

        document.body.appendChild(e); // load and run
      }
    </script>

    <div id="p8_playarea" style="display: flex">
      <canvas
        class="emscripten"
        id="canvas"
        oncontextmenu="event.preventDefault()"
      ></canvas>
    </div>

    <textarea
      id="codo_textarea"
      class="emscripten"
      style="display: none; position: absolute; left: -9999px"
    ></textarea>

    <script type="text/javascript">
      // Helper to ensure p8_run_cart works without the original container/frame wrappers
      var p8_frame = {
        offsetWidth: window.innerWidth,
        offsetHeight: window.innerHeight,
        parentNode: { parentNode: { offsetHeight: window.innerHeight } },
      };
      var p8_container = document.getElementById("p8_playarea");
      var body_0 = { style: {} };
      var p8_frame_0 = {
        parentNode: { appendChild: function () {} },
        style: {},
      };

      p8_update_layout();

      Module = { canvas: document.getElementById("canvas") };

      // Auto-start game when AudioContext is ready
      var temp_context = new AudioContext();
      temp_context.onstatechange = function () {
        if (temp_context.state == "running") {
          p8_run_cart();
          temp_context.close();
        }
      };
    </script>

    <script type="module">
      import { PLAYER_1, PLAYER_2 } from "@rcade/plugin-input-classic";

      function updateRcade() {
        if (typeof pico8_buttons !== "undefined") {
          // Player 1
          let b1 = 0;
          if (PLAYER_1.DPAD.left) b1 |= 0x1;
          if (PLAYER_1.DPAD.right) b1 |= 0x2;
          if (PLAYER_1.DPAD.up) b1 |= 0x4;
          if (PLAYER_1.DPAD.down) b1 |= 0x8;
          if (PLAYER_1.A) b1 |= 0x10;
          if (PLAYER_1.B) b1 |= 0x20;
          pico8_buttons[0] = b1;

          // Player 2
          let b2 = 0;
          if (PLAYER_2.DPAD.left) b2 |= 0x1;
          if (PLAYER_2.DPAD.right) b2 |= 0x2;
          if (PLAYER_2.DPAD.up) b2 |= 0x4;
          if (PLAYER_2.DPAD.down) b2 |= 0x8;
          if (PLAYER_2.A) b2 |= 0x10;
          if (PLAYER_2.B) b2 |= 0x20;
          pico8_buttons[1] = b2;
        }
        requestAnimationFrame(updateRcade);
      }
      updateRcade();
    </script>
  </body>
</html>
